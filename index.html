<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON PONG OVERDRIVE // WEBSOCKET MULTIPLAYER</title>
    <style>
        :root {
            --bg-color: #06060c;
            --panel-bg: rgba(12, 12, 26, 0.9);
            --text-main: #ffffff;
            --text-muted: #6b6b85;
            --neon-cyan: #00f0ff;
            --neon-magenta: #ff0055;
            --neon-yellow: #ffea00;
            --neon-green: #00ff66;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: var(--font-stack);
            color: var(--text-main);
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            max-width: 900px;
            max-height: 550px;
            background: radial-gradient(circle at center, #0f0f26 0%, #030308 100%);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
            border-radius: 16px;
        }

        .ui-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            max-width: 900px;
            height: 100%;
            max-height: 550px;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            padding: 20px;
        }

        .screen {
            width: 100%;
            max-width: 440px;
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 35px;
            text-align: center;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: none;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        .screen.active {
            display: flex;
            opacity: 1;
            transform: scale(1);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 6px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 10px rgba(0, 240, 255, 0.2));
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn-group {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-main);
            padding: 14px 28px;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.2s ease;
            outline: none;
            width: 100%;
        }

        .btn:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
            background: rgba(0, 240, 255, 0.08);
        }
        .btn:active { transform: translateY(1px); }

        .room-input {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px;
            border-radius: 50px;
            color: #fff;
            font-size: 1.1rem;
            text-align: center;
            font-family: monospace;
            letter-spacing: 4px;
            margin-bottom: 12px;
            outline: none;
        }
        .room-input:focus { border-color: var(--neon-magenta); }

        .code-display {
            font-size: 2rem;
            font-family: monospace;
            font-weight: 900;
            color: var(--neon-yellow);
            letter-spacing: 6px;
            margin: 15px 0;
            padding: 10px;
            background: rgba(255,234,0,0.05);
            border: 1px dashed var(--neon-yellow);
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
        }

        #hud {
            position: absolute;
            top: 25px;
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            padding: 0 60px;
            pointer-events: none;
            z-index: 5;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .score-wrapper { display: flex; flex-direction: column; align-items: center; }
        .score-label { font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 5px; }
        .score-val { font-size: 3.5rem; font-weight: 900; font-family: monospace; line-height: 1; }
        #score-p1 { color: var(--neon-cyan); text-shadow: 0 0 15px rgba(0, 240, 255, 0.3); }
        #score-p2 { color: var(--neon-magenta); text-shadow: 0 0 15px rgba(255, 0, 85, 0.3); }
        #hud-center { display: flex; flex-direction: column; align-items: center; }
        #match-rally { font-size: 1.1rem; font-weight: 800; color: #fff; background: rgba(255,255,255,0.05); padding: 6px 16px; border-radius: 20px; font-family: monospace; border: 1px solid rgba(255,255,255,0.05); }
        #powerup-indicators { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-top: 8px; min-height: 40px; }

        .active-power-badge {
            font-size: 0.75rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; padding: 2px 10px; border-radius: 4px; background: rgba(0,0,0,0.4); border: 1px solid transparent; font-family: monospace; display: flex; gap: 6px;
        }

        .status-msg { font-size: 0.9rem; color: var(--neon-cyan); margin: 15px 0; animation: pulse 1.5s infinite alternate; }
        @keyframes pulse { from { opacity: 0.6; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div id="hud">
            <div class="score-wrapper">
                <span id="label-p1" class="score-label">Player 1</span>
                <span id="score-p1" class="score-val">0</span>
            </div>
            <div id="hud-center">
                <div id="match-rally">Rally: 0</div>
                <div id="powerup-indicators"></div>
            </div>
            <div class="score-wrapper">
                <span id="label-p2" class="score-label">Player 2</span>
                <span id="score-p2" class="score-val">0</span>
            </div>
        </div>

        <div class="ui-layer">
            <div id="menu-screen" class="screen active">
                <h1>Neon Pong</h1>
                <div class="subtitle">Authoritative Multiplayer Core</div>
                <div class="btn-group">
                    <button class="btn" id="btn-create">Create Match Matrix</button>
                    <button class="btn" id="btn-join-menu">Join System Code</button>
                </div>
            </div>

            <div id="join-screen" class="screen">
                <h1>Sync Vector</h1>
                <div class="subtitle">Enter Target Simulation Room</div>
                <input type="text" id="input-code" class="room-input" placeholder="CODE" maxlength="5">
                <div class="btn-group">
                    <button class="btn" id="btn-submit-join">Connect to Room</button>
                    <button class="btn" id="btn-back" style="border-color:rgba(255,255,255,0.1)">Back</button>
                </div>
            </div>

            <div id="wait-screen" class="screen">
                <h1>Matrix Online</h1>
                <div class="subtitle">Share link or code with Opponent</div>
                <div class="code-display" id="display-code" title="Click to copy link">-----</div>
                <div class="status-msg">Waiting for opponent to connect...</div>
            </div>

            <div id="gameover-screen" class="screen">
                <h1 id="match-result">Match Finalized</h1>
                <div class="subtitle" id="match-sub">Data Core Terminated</div>
                <div class="code-display" id="stat-final-score" style="color:var(--neon-cyan); border:none; background:none;">0 - 0</div>
                <button class="btn" id="btn-exit">Return to Core</button>
            </div>
        </div>
    </div>

    <script>
        const SERVER_URL = "wss://neon-pong-server.onrender.com";

        class SynthEngine {
            constructor() { this.audioCtx = null; }
            init() { if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
            playTone(freq, type, duration, startVol = 0.15, endVol = 0.001) {
                if (!this.audioCtx) return;
                try {
                    let osc = this.audioCtx.createOscillator();
                    let gainNode = this.audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, this.audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(startVol, this.audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(endVol, this.audioCtx.currentTime + duration);
                    osc.connect(gainNode); gainNode.connect(this.audioCtx.destination);
                    osc.start(); osc.stop(this.audioCtx.currentTime + duration);
                } catch(e){}
            }
            paddleHit() { this.playTone(380, 'triangle', 0.08, 0.2); }
            wallBounce() { this.playTone(220, 'sine', 0.06, 0.15); }
            powerupSpawn() { this.playTone(440, 'sine', 0.12, 0.1); setTimeout(() => this.playTone(554, 'sine', 0.12, 0.1), 80); }
            powerupCollect() { this.playTone(523, 'square', 0.08, 0.1); setTimeout(() => this.playTone(659, 'square', 0.08, 0.1), 60); }
            scorePoint() { this.playTone(180, 'sawtooth', 0.2, 0.2); }
            beep() { this.playTone(440, 'sine', 0.1, 0.2, 0.01); }
            go() { this.playTone(880, 'triangle', 0.25, 0.25, 0.01); }
            gameOver(win) { this.playTone(win ? 523 : 200, win ? 'sine' : 'sawtooth', 0.4, 0.2); }
        }
        const Audio = new SynthEngine();

        const Config = { virtualWidth: 900, virtualHeight: 550, paddleWidth: 14, ballSize: 12 };

        class ClientGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.ws = null;
                this.playerSlot = null;
                this.roomCode = null;

                this.syncState = null;
                this.localPaddleY = Config.virtualHeight / 2 - 45;
                this.paddleHeight = 90;

                this.particles = [];
                this.shakeIntensity = 0;
                this.flashIntensity = 0;
                this.ballTrails = [];

                this.countdownVal = null;
                this.countdownScale = 1.0;
                this.countdownAlpha = 1.0;

                this.keys = {};
                this.initCanvasSize();
                this.bindUVEvents();

                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.has('room')) {
                    this.openWebSocketConnection(() => {
                        this.ws.send(JSON.stringify({ type: 'JOIN', code: urlParams.get('room') }));
                    });
                }

                this.lastTime = performance.now();
                requestAnimationFrame((t) => this.renderLoopFrame(t));
            }

            initCanvasSize() {
                const dpr = window.devicePixelRatio || 1;
                let w = Math.min(window.innerWidth, 900);
                let h = (w * 550) / 900;
                if (h > window.innerHeight) { h = Math.min(window.innerHeight, 550); w = (h * 900) / 550; }
                this.canvas.width = w * dpr; this.canvas.height = h * dpr;
                this.ctx.scale(dpr, dpr);
                this.scaleFactor = w / Config.virtualWidth;
            }

            bindUVEvents() {
                window.addEventListener('resize', () => this.initCanvasSize());
                window.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                    if(["Space", "ArrowUp", "ArrowDown", "KeyW", "KeyS"].includes(e.code)) e.preventDefault();
                });
                window.addEventListener('keyup', (e) => this.keys[e.key] = false);

                this.canvas.addEventListener('touchmove', (e) => {
                    if (!this.playerSlot || e.touches.length === 0) return;
                    const rect = this.canvas.getBoundingClientRect();
                    let relativeY = (e.touches[0].clientY - rect.top) / this.scaleFactor;
                    this.localPaddleY = relativeY - this.paddleHeight / 2;
                    this.localPaddleY = Math.max(0, Math.min(Config.virtualHeight - this.paddleHeight, this.localPaddleY));
                }, { passive: true });

                document.getElementById('btn-create').addEventListener('click', () => {
                    Audio.init();
                    this.openWebSocketConnection(() => this.ws.send(JSON.stringify({ type: 'CREATE' })));
                });
                document.getElementById('btn-join-menu').addEventListener('click', () => {
                    Audio.init(); this.switchScreen('join-screen');
                });
                document.getElementById('btn-back').addEventListener('click', () => this.switchScreen('menu-screen'));
                document.getElementById('btn-submit-join').addEventListener('click', () => {
                    let code = document.getElementById('input-code').value.toUpperCase().trim();
                    if(code.length === 5) {
                        this.openWebSocketConnection(() => this.ws.send(JSON.stringify({ type: 'JOIN', code: code })));
                    }
                });
                document.getElementById('btn-exit').addEventListener('click', () => {
                    window.location.search = '';
                });
                document.getElementById('display-code').addEventListener('click', () => {
                    let shareUrl = `${window.location.origin}${window.location.pathname}?room=${this.roomCode}`;
                    navigator.clipboard.writeText(shareUrl).then(() => {
                        alert("Invitation link copied to clipboard!");
                    });
                });
            }

            switchScreen(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                document.getElementById('hud').style.opacity = (id === 'playing-active') ? '1' : '0';
            }

            openWebSocketConnection(onOpenCallback) {
                if (this.ws && this.ws.readyState <= 1) {
                    if (onOpenCallback) onOpenCallback();
                    return;
                }

                this.ws = new WebSocket(SERVER_URL);
                this.ws.onopen = () => { if(onOpenCallback) onOpenCallback(); };

                this.ws.onmessage = (msg) => {
                    const packet = JSON.parse(msg.data);
                    this.processNetworkPacket(packet);
                };

                this.ws.onclose = () => {
                    this.switchScreen('menu-screen');
                };
                this.ws.onerror = () => {
                    alert("Connection failed. Server may be starting up - try again in 30 seconds.");
                    this.switchScreen('menu-screen');
                };
            }

            processNetworkPacket(packet) {
                switch(packet.type) {
                    case 'ROOM_CREATED':
                        this.roomCode = packet.code; this.playerSlot = packet.slot;
                        document.getElementById('display-code').innerText = packet.code;
                        this.switchScreen('wait-screen');
                        break;
                    case 'ROOM_JOINED':
                        this.roomCode = packet.code; this.playerSlot = packet.slot;
                        break;
                    case 'MATCH_READY':
                        document.getElementById('hud').style.opacity = '1';
                        this.switchScreen('playing-active');
                        break;
                    case 'SYNC':
                        this.syncState = packet;
                        this.paddleHeight = (this.playerSlot === 1) ? packet.p1Height : packet.p2Height;
                        this.updateHUDLabels();
                        break;
                    case 'COUNTDOWN':
                        this.countdownVal = packet.val;
                        this.countdownScale = 3.5; this.countdownAlpha = 1.0;
                        if(packet.val === 'GO!') Audio.go(); else Audio.beep();
                        break;
                    case 'PADDLE_HIT':
                        Audio.paddleHit(); this.shakeIntensity = 6;
                        this.triggerImpactFx(packet.x, packet.y, packet.side > 0 ? '#00f0ff' : '#ff0055', 12);
                        break;
                    case 'WALL_BOUNCE':
                        Audio.wallBounce(); this.triggerImpactFx(packet.x, packet.y, '#ffffff', 4);
                        break;
                    case 'POWERUP_SPAWNED':
                        Audio.powerupSpawn(); this.triggerImpactFx(packet.x, packet.y, packet.color, 8);
                        break;
                    case 'POWERUP_COLLECTED':
                        Audio.powerupCollect();
                        this.triggerImpactFx(this.syncState?.powerup?.x || 450, this.syncState?.powerup?.y || 275, packet.color, 24, 0.08);
                        break;
                    case 'SCORE_EVENT':
                        Audio.scorePoint(); this.shakeIntensity = 16; this.flashIntensity = 0.3;
                        break;
                    case 'OPPONENT_DISCONNECTED':
                        alert("Opponent disconnected.");
                        window.location.search = '';
                        break;
                    case 'GAME_OVER':
                        this.switchScreen('gameover-screen');
                        let winState = (packet.winner === this.playerSlot);
                        Audio.gameOver(winState);
                        document.getElementById('match-result').innerText = winState ? "VICTORY ACHIEVED" : "SYSTEM DEFEAT";
                        document.getElementById('match-result').style.background = winState ? "linear-gradient(45deg, #00f0ff, #00ff66)" : "linear-gradient(45deg, #ff0055, #ff5500)";
                        document.getElementById('match-result').style.webkitBackgroundClip = "text";
                        document.getElementById('stat-final-score').innerText = `${packet.score1} - ${packet.score2}`;
                        break;
                    case 'ERROR':
                        alert(packet.message);
                        this.switchScreen('menu-screen');
                        break;
                }
            }

            updateHUDLabels() {
                if(!this.syncState) return;
                document.getElementById('score-p1').innerText = this.syncState.score1 ?? 0;
                document.getElementById('score-p2').innerText = this.syncState.score2 ?? 0;
                document.getElementById('match-rally').innerText = `Rally: ${this.syncState.rally}`;

                document.getElementById('label-p1').innerText = (this.playerSlot === 1) ? "Player 1 (You)" : "Player 1";
                document.getElementById('label-p2').innerText = (this.playerSlot === 2) ? "Player 2 (You)" : "Player 2";

                const container = document.getElementById('powerup-indicators');
                container.innerHTML = '';
                this.syncState.modifiers.forEach(mod => {
                    let typeLabel = (mod.typeId === 1) ? 'BIG PADDLE' : (mod.typeId === 2) ? 'SHRINK ENEMY' : (mod.typeId === 3) ? 'SLOW BALL' : 'MULTI-BALL';
                    let typeColor = (mod.typeId === 1) ? '#00ff66' : (mod.typeId === 2) ? '#ff0055' : (mod.typeId === 3) ? '#00f0ff' : '#ffea00';

                    let badge = document.createElement('div');
                    badge.className = 'active-power-badge';
                    badge.style.borderColor = typeColor; badge.style.color = typeColor;
                    badge.innerHTML = `<span>${typeLabel}</span><span style="color:#fff">${(mod.timeLeft/1000).toFixed(1)}s</span>`;
                    container.appendChild(badge);
                });
            }

            updateLocalMovement(dt) {
                if (this.keys['ArrowUp'] || this.keys['w'] || this.keys['W']) this.localPaddleY -= 9.5;
                if (this.keys['ArrowDown'] || this.keys['s'] || this.keys['S']) this.localPaddleY += 9.5;
                this.localPaddleY = Math.max(0, Math.min(Config.virtualHeight - this.paddleHeight, this.localPaddleY));

                if (this.ws && this.ws.readyState === 1 && this.playerSlot) {
                    this.ws.send(JSON.stringify({ type: 'INPUT', y: this.localPaddleY }));
                }
            }

            triggerImpactFx(x, y, color, count, flashIncr = 0) {
                if (flashIncr > 0) this.flashIntensity = Math.min(0.5, this.flashIntensity + flashIncr);
                for(let i=0; i<count; i++) {
                    this.particles.push({
                        x, y, vx: (Math.random()-0.5)*11, vy: (Math.random()-0.5)*11,
                        size: Math.random()*3+2, color, alpha: 1, decay: Math.random()*0.03+0.015
                    });
                }
            }

            renderLoopFrame(timestamp) {
                let dt = timestamp - this.lastTime;
                if (dt > 100) dt = 16.66;
                this.lastTime = timestamp;

                if (this.shakeIntensity > 0) this.shakeIntensity *= 0.88;
                if (this.flashIntensity > 0) this.flashIntensity -= 0.015;
                if (this.countdownAlpha > 0) {
                    this.countdownScale -= 0.003 * dt;
                    this.countdownAlpha -= 0.0015 * dt;
                }

                for (let i = this.particles.length - 1; i >= 0; i--) {
                    let p = this.particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= p.decay;
                    if(p.alpha <= 0) this.particles.splice(i, 1);
                }

                this.updateLocalMovement(dt);
                this.drawScene();

                requestAnimationFrame((t) => this.renderLoopFrame(t));
            }

            drawScene() {
                this.ctx.clearRect(0, 0, Config.virtualWidth, Config.virtualHeight);
                this.ctx.save();

                if (this.shakeIntensity > 0) {
                    this.ctx.translate((Math.random()-0.5)*this.shakeIntensity, (Math.random()-0.5)*this.shakeIntensity);
                }

                this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.025)';
                this.ctx.lineWidth = 4; this.ctx.setLineDash([14, 14]);
                this.ctx.beginPath(); this.ctx.moveTo(Config.virtualWidth/2, 0); this.ctx.lineTo(Config.virtualWidth/2, Config.virtualHeight);
                this.ctx.stroke(); this.ctx.setLineDash([]);

                if (this.syncState) {
                    this.ctx.shadowBlur = 16; this.ctx.shadowColor = '#00f0ff'; this.ctx.fillStyle = '#00f0ff';
                    this.ctx.fillRect(20, this.syncState.p1Y, Config.paddleWidth, this.syncState.p1Height);

                    this.ctx.shadowBlur = 16; this.ctx.shadowColor = '#ff0055'; this.ctx.fillStyle = '#ff0055';
                    this.ctx.fillRect(Config.virtualWidth - Config.paddleWidth - 20, this.syncState.p2Y, Config.paddleWidth, this.syncState.p2Height);

                    if (this.syncState.powerup) {
                        let fp = this.syncState.powerup;
                        let color = (fp.id === 1) ? '#00ff66' : (fp.id === 2) ? '#ff0055' : (fp.id === 3) ? '#00f0ff' : '#ffea00';
                        this.ctx.save(); this.ctx.translate(fp.x, fp.y);
                        this.ctx.shadowBlur = 16; this.ctx.shadowColor = color; this.ctx.fillStyle = color;
                        this.ctx.fillRect(-12, -12, 24, 24);
                        this.ctx.strokeStyle = '#fff'; this.ctx.lineWidth = 2; this.ctx.strokeRect(-9, -9, 18, 18);
                        this.ctx.restore();

                        this.ctx.shadowBlur = 0; this.ctx.fillStyle = 'rgba(255,255,255,0.6)';
                        this.ctx.font = 'bold 9px monospace'; this.ctx.textAlign = 'center';
                        this.ctx.fillText(fp.label, fp.x, fp.y - 18);
                    }

                    this.syncState.balls.forEach((b, idx) => {
                        if (!this.ballTrails[idx]) this.ballTrails[idx] = [];
                        let history = this.ballTrails[idx];
                        history.push({ x: b.x, y: b.y });
                        if (history.length > Math.floor(b.speed * 1.5) + 5) history.shift();

                        history.forEach((pos, trailIdx) => {
                            let alpha = (trailIdx / history.length) * 0.22;
                            this.ctx.fillStyle = `rgba(255,255,255, ${alpha})`; this.ctx.shadowBlur = 0;
                            this.ctx.beginPath();
                            this.ctx.arc(pos.x + Config.ballSize/2, pos.y + Config.ballSize/2, (Config.ballSize/2) * (trailIdx / history.length), 0, Math.PI*2);
                            this.ctx.fill();
                        });

                        this.ctx.shadowBlur = b.isOriginal ? 14 : 8;
                        this.ctx.shadowColor = b.isOriginal ? '#ffffff' : '#ffea00';
                        this.ctx.fillStyle = b.isOriginal ? '#ffffff' : '#ffea00';
                        this.ctx.beginPath();
                        this.ctx.arc(b.x + Config.ballSize/2, b.y + Config.ballSize/2, Config.ballSize/2, 0, Math.PI*2);
                        this.ctx.fill();
                    });
                }

                this.ctx.shadowBlur = 8;
                for(let i=0; i<this.particles.length; i++){
                    let p = this.particles[i];
                    this.ctx.shadowColor = p.color; this.ctx.fillStyle = p.color; this.ctx.globalAlpha = p.alpha;
                    this.ctx.fillRect(p.x, p.y, p.size, p.size);
                }
                this.ctx.restore();

                if (this.countdownAlpha > 0 && this.countdownVal) {
                    this.ctx.save(); this.ctx.translate(Config.virtualWidth/2, Config.virtualHeight/2);
                    this.ctx.scale(Math.max(0.5, this.countdownScale), Math.max(0.5, this.countdownScale));
                    let color = (this.countdownVal === 'GO!') ? '#00ff66' : '#ffea00';
                    this.ctx.shadowBlur = 24; this.ctx.shadowColor = color; this.ctx.fillStyle = color;
                    this.ctx.globalAlpha = Math.max(0, Math.min(1, this.countdownAlpha));
                    this.ctx.font = 'bold 38px monospace'; this.ctx.textAlign = 'center'; this.ctx.textBaseline = 'middle';
                    this.ctx.fillText(this.countdownVal, 0, 0); this.ctx.restore();
                }

                if (this.flashIntensity > 0) {
                    this.ctx.fillStyle = `rgba(255, 255, 255, ${this.flashIntensity})`;
                    this.ctx.fillRect(0, 0, Config.virtualWidth, Config.virtualHeight);
                }
            }
        }

        window.addEventListener('DOMContentLoaded', () => { new ClientGame(); });
    </script>
</body>
</html>
